<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCV.js 测试</title>
    <script src="/opencv/opencv.js"></script>
</head>
<body>
    <h1>OpenCV.js 测试页面</h1>

    <div>
        <h2>测试图片上传</h2>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div>
        <h2>原始图片</h2>
        <img id="inputImage" style="max-width: 500px; max-height: 400px;">
    </div>

    <div>
        <h2>处理结果</h2>
        <canvas id="outputCanvas" style="max-width: 500px; max-height: 400px;"></canvas>
    </div>

    <div>
        <h2>控制按钮</h2>
        <button id="detectButton">检测边缘</button>
        <button id="grayButton">转换为灰度图</button>
    </div>

    <script>
        let imgElement = document.getElementById('inputImage');
        let inputElement = document.getElementById('imageInput');
        let outputCanvas = document.getElementById('outputCanvas');
        let detectButton = document.getElementById('detectButton');
        let grayButton = document.getElementById('grayButton');

        // 处理文件上传
        inputElement.addEventListener('change', (e) => {
            imgElement.src = URL.createObjectURL(e.target.files[0]);
        });

        // 等待 OpenCV.js 加载完成
        function onOpenCvReady() {
            console.log('OpenCV.js is ready');
            document.getElementById('detectButton').disabled = false;
            document.getElementById('grayButton').disabled = false;
        }

        // 边缘检测功能
        detectButton.addEventListener('click', () => {
            if (!imgElement.src) {
                alert('请先上传图片');
                return;
            }

            let src = cv.imread(imgElement);
            let dst = new cv.Mat();

            // 转换为灰度图
            cv.cvtColor(src, src, cv.COLOR_RGBA2GRAY);

            // 高斯模糊
            cv.GaussianBlur(src, src, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);

            // Canny 边缘检测
            cv.Canny(src, dst, 50, 150, 3, false);

            // 显示结果
            cv.imshow(outputCanvas, dst);

            // 清理内存
            src.delete();
            dst.delete();
        });

        // 灰度图转换功能
        grayButton.addEventListener('click', () => {
            if (!imgElement.src) {
                alert('请先上传图片');
                return;
            }

            let src = cv.imread(imgElement);
            let dst = new cv.Mat();

            // 转换为灰度图
            cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);

            // 显示结果
            cv.imshow(outputCanvas, dst);

            // 清理内存
            src.delete();
            dst.delete();
        });
    </script>
</body>
</html>
