<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCV.js 纸张检测测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .image-container {
            position: relative;
            display: inline-block;
        }
        .corner-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: red;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .result-info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>OpenCV.js 纸张检测测试</h1>

    <div class="container">
        <div>
            <h2>上传测试图片</h2>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div>
            <h2>原始图片</h2>
            <div class="image-container">
                <img id="inputImage" style="max-width: 600px; max-height: 500px; border: 1px solid #ddd;">
            </div>
        </div>

        <div>
            <h2>控制按钮</h2>
            <button id="detectButton" disabled>检测纸张四角</button>
            <button id="resetButton">重置</button>
        </div>

        <div id="resultInfo" class="result-info" style="display: none;">
            <h3>检测结果</h3>
            <p id="resultText"></p>
        </div>
    </div>

    <script src="/opencv.js"></script>
    <script>
        let imgElement = document.getElementById('inputImage');
        let inputElement = document.getElementById('imageInput');
        let detectButton = document.getElementById('detectButton');
        let resetButton = document.getElementById('resetButton');
        let resultInfo = document.getElementById('resultInfo');
        let resultText = document.getElementById('resultText');
        let cornerMarkers = [];

        // 处理文件上传
        inputElement.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                imgElement.src = URL.createObjectURL(e.target.files[0]);
                // 清除之前的结果
                clearCornerMarkers();
                resultInfo.style.display = 'none';
            }
        });

        // 图片加载完成后启用检测按钮
        imgElement.addEventListener('load', () => {
            detectButton.disabled = false;
        });

        // 重置按钮
        resetButton.addEventListener('click', () => {
            inputElement.value = '';
            imgElement.src = '';
            detectButton.disabled = true;
            clearCornerMarkers();
            resultInfo.style.display = 'none';
        });

        // 清除角点标记
        function clearCornerMarkers() {
            cornerMarkers.forEach(marker => marker.remove());
            cornerMarkers = [];
        }

        // 添加角点标记
        function addCornerMarker(x, y) {
            const marker = document.createElement('div');
            marker.className = 'corner-marker';
            marker.style.left = x + 'px';
            marker.style.top = y + 'px';
            document.querySelector('.image-container').appendChild(marker);
            cornerMarkers.push(marker);
        }

        // 等待 OpenCV.js 加载完成
        function onOpenCvReady() {
            console.log('OpenCV.js is ready');
        }

        // 纸张检测功能
        detectButton.addEventListener('click', async () => {
            if (!imgElement.src) {
                alert('请先上传图片');
                return;
            }

            detectButton.disabled = true;
            detectButton.textContent = '检测中...';

            try {
                const corners = await detectPaperCorners();

                if (corners && corners.length === 4) {
                    // 显示角点标记
                    clearCornerMarkers();
                    corners.forEach(corner => {
                        addCornerMarker(corner.x, corner.y);
                    });

                    // 显示结果信息
                    resultText.innerHTML = `
                        检测到纸张四角：<br>
                        左上: (${corners[0].x.toFixed(1)}, ${corners[0].y.toFixed(1)})<br>
                        右上: (${corners[1].x.toFixed(1)}, ${corners[1].y.toFixed(1)})<br>
                        右下: (${corners[2].x.toFixed(1)}, ${corners[2].y.toFixed(1)})<br>
                        左下: (${corners[3].x.toFixed(1)}, ${corners[3].y.toFixed(1)})
                    `;
                    resultInfo.style.display = 'block';
                } else {
                    resultText.textContent = '未能检测到完整的纸张轮廓';
                    resultInfo.style.display = 'block';
                    clearCornerMarkers();
                }
            } catch (error) {
                console.error('检测失败:', error);
                resultText.textContent = '检测失败: ' + error.message;
                resultInfo.style.display = 'block';
                clearCornerMarkers();
            } finally {
                detectButton.disabled = false;
                detectButton.textContent = '检测纸张四角';
            }
        });

        // 纸张角点检测函数
        async function detectPaperCorners() {
            return new Promise((resolve, reject) => {
                try {
                    // 创建源图像矩阵
                    const src = cv.imread(imgElement);

                    // 转换为灰度图
                    const gray = new cv.Mat();
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

                    // 高斯模糊
                    const blurred = new cv.Mat();
                    cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);

                    // 边缘检测
                    const edges = new cv.Mat();
                    cv.Canny(blurred, edges, 50, 150);

                    // 形态学操作 - 闭运算连接边缘
                    const kernel = cv.Mat.ones(5, 5, cv.CV_8UC1);
                    const closed = new cv.Mat();
                    cv.morphologyEx(edges, closed, cv.MORPH_CLOSE, kernel);

                    // 查找轮廓
                    const contours = new cv.MatVector();
                    const hierarchy = new cv.Mat();
                    cv.findContours(closed, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    // 寻找最大的四边形轮廓
                    let largestContour = null;
                    let maxArea = 0;

                    for (let i = 0; i < contours.size(); i++) {
                        const contour = contours.get(i);
                        const area = cv.contourArea(contour);

                        // 只考虑面积足够大的轮廓
                        if (area > maxArea && area > (src.rows * src.cols * 0.1)) {
                            // 近似轮廓为多边形
                            const epsilon = 0.02 * cv.arcLength(contour, true);
                            const approx = new cv.Mat();
                            cv.approxPolyDP(contour, approx, epsilon, true);

                            // 如果近似后是四边形
                            if (approx.rows === 4) {
                                maxArea = area;
                                largestContour = approx;
                            } else {
                                approx.delete();
                            }
                        }
                        contour.delete();
                    }

                    // 清理内存
                    src.delete();
                    gray.delete();
                    blurred.delete();
                    edges.delete();
                    closed.delete();
                    kernel.delete();
                    contours.delete();
                    hierarchy.delete();

                    if (largestContour) {
                        // 提取四角坐标
                        const corners = [];
                        for (let i = 0; i < largestContour.rows; i++) {
                            const point = largestContour.ptr(i, 0);
                            corners.push({
                                x: point[0],
                                y: point[1]
                            });
                        }

                        largestContour.delete();

                        // 按顺时针排序角点
                        const sortedCorners = sortCorners(corners);
                        resolve(sortedCorners);
                    } else {
                        resolve(null);
                    }
                } catch (error) {
                    reject(error);
                }
            });
        }

        // 对角点进行排序
        function sortCorners(corners) {
            // 计算中心点
            const centerX = corners.reduce((sum, point) => sum + point.x, 0) / corners.length;
            const centerY = corners.reduce((sum, point) => sum + point.y, 0) / corners.length;

            // 更精确的排序方法
            const topLeft = corners.reduce((prev, curr) =>
                (prev.x + prev.y) < (curr.x + curr.y) ? prev : curr
            );

            const topRight = corners.reduce((prev, curr) =>
                (prev.x - prev.y) < (curr.x - curr.y) ? curr : prev
            );

            const bottomRight = corners.reduce((prev, curr) =>
                (prev.x + prev.y) > (curr.x + curr.y) ? prev : curr
            );

            const bottomLeft = corners.reduce((prev, curr) =>
                (prev.x - prev.y) > (curr.x - curr.y) ? prev : curr
            );

            return [topLeft, topRight, bottomRight, bottomLeft];
        }
    </script>
</body>
</html>
